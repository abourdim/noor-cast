<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Animated clapperboard with play button — used in header -->
  <g>
    <!-- clapperboard body -->
    <rect x="14" y="44" width="100" height="72" rx="8" fill="#0c1f0a" stroke="#a3e635" stroke-width="3"/>

    <!-- clapperboard top (animated: rotates/claps) -->
    <g style="transform-origin: 18px 30px;">
      <animateTransform attributeName="transform" type="rotate"
                        values="0 18 30; -22 18 30; 0 18 30; 0 18 30; 0 18 30"
                        keyTimes="0;.08;.18;.5;1"
                        dur="3s" repeatCount="indefinite"/>
      <rect x="14" y="14" width="100" height="20" rx="4" fill="#0c1f0a" stroke="#a3e635" stroke-width="3"/>
      <polygon points="20,34 36,18 50,18 34,34" fill="#a3e635"/>
      <polygon points="54,34 70,18 84,18 68,34" fill="#a3e635"/>
      <polygon points="88,34 104,18 112,18 102,34" fill="#a3e635"/>
    </g>

    <!-- play triangle -->
    <polygon points="52,62 52,98 84,80" fill="#fb923c" stroke="#fdba74" stroke-width="2" stroke-linejoin="round"/>

    <!-- blinking red LED -->
    <circle cx="102" cy="104" r="4" fill="#ef4444">
      <animate attributeName="opacity" values="1;.2;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
